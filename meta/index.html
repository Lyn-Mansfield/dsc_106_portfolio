<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css"> <!-- separate to avoid clutter -->
    <script src="../global.js" type="module"></script>
    <script src="main.js" type="module"></script>
</head>

<body>
    <dl id="commit-tooltip" class="info tooltip" hidden>
        <dt>Commit</dt>
        <dd>
            <a href="" id="commit-link" target="_blank"></a>
        </dd>

        <dt>Date</dt>
        <dd id="commit-date"></dd>

        <dt>Lines Edited</dt>
        <dd id="lines-edited"></dd>
    </dl>

    <h1>Meta</h1>

    <p>Here is some metadata about my GitHub activity!
        I have been most active on my school account, though you will find some other projects on my personal page.
    </p>

    <h2>Commit Stats</h2>
    <div id="stats"></div>

    <div id="scrolly-1">
        <div id="scatter-story"></div>
        <div id="scatter-plot">
            <h2>Commits by time of day</h2>
            <div id="chart"></div>

            <div class="center">
                <dl id="selection-count" class="stats">
                    <dt>Commits Selected</dt>
                    <dd>0</dd>
                </dl>
            </div>

            <div class="center">
                <dl id="language-breakdown" class="stats"></dl>
            </div>
        </div>
    </div>



    <div class="commit-time-filter">
        <label for="commit-progress">Show commits until:</label>
        <input type="range" id="commit-progress" min="0" max="100" value="100">
        <time id="commit-time" datetime=""></time>
    </div>

    <dl id="files"></dl>
</body>

</html>
